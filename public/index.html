<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Voice-controlled word game" />
    <title>Word Game</title>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Median.co specific -->
    <script>
        // Handle median.co app permissions
        if (window.Median) {
            console.log('Running in Median.co app');
        }
        
        // Request microphone permission on user interaction for iOS
        document.addEventListener('click', function initAudio() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(function(stream) {
                        stream.getTracks().forEach(track => track.stop());
                        console.log('Microphone permission granted');
                    })
                    .catch(function(err) {
                        console.log('Microphone permission error:', err);
                    });
            }
            document.removeEventListener('click', initAudio);
        });
    </script>
</body>
</html>
