<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Voice-Controlled Word Puzzle Game" />
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bee Maze" />
    
    <!-- Android specific -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Improve touch response -->
    <meta name="msapplication-tap-highlight" content="no" />
    
    <title>BeeTrail</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* Improve touch responsiveness */
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        #root {
            width: 100%;
            height: 100%;
            position: relative;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Make buttons larger and more touch-friendly */
        button, 
        .voice-control-button,
        .permission-button,
        .start-playing-btn,
        .action-button,
        .letter-tile {
            min-height: 48px;
            min-width: 48px;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(123, 31, 162, 0.3);
        }
        
        /* Remove any pointer-events restrictions */
        button:active,
        .voice-control-button:active,
        .permission-button:active {
            transform: scale(0.97);
            transition: transform 0.05s;
        }
        
        /* Loading indicator */
        .app-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a2a3a;
            color: white;
            z-index: 9999;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #7b1fa2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
        <div class="app-loading">
            <div class="spinner"></div>
            <span>Loading game...</span>
        </div>
    </div>
    
    <script>
        // Remove loading spinner when React loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loadingEl = document.querySelector('.app-loading');
                if (loadingEl) loadingEl.style.display = 'none';
            }, 500);
        });
        
        // ============================================
        // SIMPLIFIED MICROPHONE HANDLER FOR MEDIAN.CO
        // ============================================
        
        console.log('App initializing...');
        
        // Global permission state
        window.hasMicrophonePermission = false;
        
        // Simple function to request microphone permission
        window.requestMicrophonePermission = async function() {
            console.log('Requesting microphone permission...');
            
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    console.error('getUserMedia not available');
                    return false;
                }
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                window.hasMicrophonePermission = true;
                console.log('Microphone permission GRANTED!');
                return true;
                
            } catch (error) {
                console.error('Microphone permission error:', error.name, error.message);
                window.hasMicrophonePermission = false;
                
                // Show helpful message based on error
                if (error.name === 'NotAllowedError') {
                    alert('Please grant microphone permission in your device settings.');
                } else if (error.name === 'NotFoundError') {
                    alert('No microphone found on this device.');
                }
                return false;
            }
        };
        
        // Auto-request after user touches anywhere (for iOS)
        let permissionRequested = false;
        
        async function handleUserInteraction() {
            if (!permissionRequested && !window.hasMicrophonePermission) {
                permissionRequested = true;
                console.log('User interaction - requesting microphone...');
                await window.requestMicrophonePermission();
            }
        }
        
        // Listen for user interaction
        document.addEventListener('touchstart', handleUserInteraction);
        document.addEventListener('click', handleUserInteraction);
        
        // For Android, try to request after a short delay
        setTimeout(async () => {
            const isAndroid = /Android/i.test(navigator.userAgent);
            if (isAndroid && !permissionRequested) {
                console.log('Android - attempting auto-request...');
                await window.requestMicrophonePermission();
            }
        }, 2000);
        
        console.log('App ready - waiting for user interaction');
    </script>
</body>
</html>
