<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Voice-Controlled Word Puzzle Game - Phase 4 Bee Maze" />
    
    <!-- Android and iOS specific meta tags for WebView apps -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: gap: content: https://ssl.gstatic.com; media-src *; img-src * data: content:; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval' blob:;" />
    
    <!-- For iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Word Game" />
    
    <!-- For Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>BeeTrail</title>
    
    <style>
        /* Global styles to ensure no click blocking */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            pointer-events: auto !important;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        #root {
            width: 100%;
            min-height: 100%;
            position: relative;
        }
        
        /* Ensure all buttons are clickable */
        button, 
        a, 
        [role="button"],
        .clickable,
        .voice-control-button,
        .permission-button,
        .start-playing-btn {
            cursor: pointer !important;
            pointer-events: auto !important;
            touch-action: manipulation !important;
        }
        
        /* Remove any backdrop filters that might cause issues */
        .permission-overlay,
        .tutorial-overlay,
        .modal-overlay {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        
        /* Ensure proper touch events for mobile */
        @media (hover: none) and (pointer: coarse) {
            button, 
            .voice-control-button,
            .permission-button {
                min-height: 44px;
                min-width: 44px;
            }
        }
        
        /* Loading indicator */
        .app-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a2a3a;
            color: white;
            font-size: 1.2rem;
            z-index: 9999;
        }
        
        .app-loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #7b1fa2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
        <div class="app-loading">
            <div class="spinner"></div>
            <span>Loading game...</span>
        </div>
    </div>
    
    <script>
        // Remove loading spinner when React loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loadingEl = document.querySelector('.app-loading');
                if (loadingEl) {
                    loadingEl.style.display = 'none';
                }
            }, 500);
        });
        
        // ============================================
        // MICROPHONE PERMISSION HANDLER FOR MEDIAN.CO APP
        // ============================================
        
        // Detect if running in median.co app
        const isMedianApp = () => {
            return window.Median !== undefined || 
                   navigator.userAgent.includes('Median') || 
                   window.location.protocol === 'capacitor:' ||
                   window.location.href.includes('median');
        };
        
        // Detect platform
        const isAndroid = () => {
            return /Android/i.test(navigator.userAgent);
        };
        
        const isIOS = () => {
            return /iPhone|iPad|iPod/i.test(navigator.userAgent);
        };
        
        console.log('Platform detection:', { 
            isMedian: isMedianApp(), 
            isAndroid: isAndroid(), 
            isIOS: isIOS(),
            userAgent: navigator.userAgent
        });
        
        // Auto-request microphone permission on page load for median.co apps
        async function autoRequestMicrophonePermission() {
            console.log('Attempting to auto-request microphone permission...');
            
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    console.log('getUserMedia not available');
                    return false;
                }
                
                // For iOS, we need user interaction first, so we'll wait for a tap
                if (isIOS() && !window.hasRequestedPermission) {
                    console.log('iOS requires user interaction first');
                    
                    // Listen for first touch anywhere on screen
                    const requestOnTouch = async () => {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            stream.getTracks().forEach(track => track.stop());
                            console.log('Microphone permission granted via touch');
                            window.hasMicrophonePermission = true;
                            window.removeEventListener('touchstart', requestOnTouch);
                            window.removeEventListener('click', requestOnTouch);
                        } catch (err) {
                            console.log('Microphone permission denied:', err);
                        }
                    };
                    
                    window.addEventListener('touchstart', requestOnTouch);
                    window.addEventListener('click', requestOnTouch);
                    return false;
                }
                
                // For Android and other platforms, request directly
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                console.log('Microphone permission granted automatically');
                window.hasMicrophonePermission = true;
                return true;
                
            } catch (error) {
                console.log('Auto-request microphone failed:', error);
                return false;
            }
        }
        
        // Store permission status globally
        window.hasMicrophonePermission = false;
        
        // Try to auto-request after a short delay
        setTimeout(() => {
            autoRequestMicrophonePermission();
        }, 1000);
        
        // Also listen for any user interaction to request permission if not yet granted
        function requestMicrophoneOnInteraction() {
            if (!window.hasMicrophonePermission) {
                console.log('User interaction detected, requesting microphone...');
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        stream.getTracks().forEach(track => track.stop());
                        window.hasMicrophonePermission = true;
                        console.log('Microphone permission granted');
                    })
                    .catch(err => {
                        console.log('Microphone permission denied:', err);
                    });
            }
        }
        
        // Add event listeners for user interaction
        document.addEventListener('click', requestMicrophoneOnInteraction);
        document.addEventListener('touchstart', requestMicrophoneOnInteraction);
        
        // Export permission status for React components
        window.getMicrophoneStatus = () => window.hasMicrophonePermission;
        
        // Function to explicitly request permission (to be called from React)
        window.requestMicrophonePermission = async () => {
            console.log('Explicit microphone permission request from React');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                window.hasMicrophonePermission = true;
                return true;
            } catch (error) {
                console.error('Microphone permission error:', error);
                return false;
            }
        };
        
        // Console log for debugging
        console.log('Index.html loaded - Microphone handlers ready');
    </script>
    
    <!-- Your React app will be injected here -->
</body>
</html>
